server {
  listen 80;
  server_name _;
  resolver 127.0.0.11 valid=10s ipv6=off;

  set $auth_upstream http://auth-service:3001;
  set $agenda_upstream http://agenda-service:3002;
  set $notifications_upstream http://notifications-service:3003;
  set $records_upstream http://records-service:3004;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
    add_header Cache-Control "no-store";
  }

  location ~* \.(js|css)$ {
    add_header Cache-Control "no-store";
  }

  location /api/auth/ {
    proxy_pass $auth_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/agenda/ {
    proxy_pass $agenda_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/notifications/ {
    proxy_pass $notifications_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/records/ {
    proxy_pass $records_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
